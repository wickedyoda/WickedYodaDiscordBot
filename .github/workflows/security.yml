name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks scan
        id: gitleaks
        run: |
          set +e
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            zricethezav/gitleaks:v8.24.3 \
            detect \
            --source . \
            --no-git \
            --redact \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif
          scan_exit_code=$?
          if [ ! -f gitleaks.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > gitleaks.sarif
          fi
          echo "scan_exit_code=${scan_exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif

      - name: Fail on leaks
        if: steps.gitleaks.outputs.scan_exit_code != '0'
        run: exit 1

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trivy filesystem scan
        id: trivy_fs
        run: |
          set +e
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            aquasec/trivy:0.56.1 \
            fs \
            --severity HIGH,CRITICAL \
            --scanners vuln,misconfig,secret \
            --db-repository public.ecr.aws/aquasecurity/trivy-db:2 \
            --java-db-repository public.ecr.aws/aquasecurity/trivy-java-db:1 \
            --format sarif \
            --output trivy-fs.sarif \
            --exit-code 1 \
            .
          scan_exit_code=$?
          if [ ! -f trivy-fs.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > trivy-fs.sarif
          fi
          echo "scan_exit_code=${scan_exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload FS scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

      - name: Fail on vulnerabilities
        if: steps.trivy_fs.outputs.scan_exit_code != '0'
        run: exit 1

  trivy-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: wickedyoda-little-helper:scan
          push: false

      - name: Trivy image scan
        id: trivy_image
        run: |
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            aquasec/trivy:0.56.1 \
            image \
            --severity HIGH,CRITICAL \
            --db-repository public.ecr.aws/aquasecurity/trivy-db:2 \
            --java-db-repository public.ecr.aws/aquasecurity/trivy-java-db:1 \
            --format sarif \
            --output trivy-image.sarif \
            --exit-code 1 \
            wickedyoda-little-helper:scan
          scan_exit_code=$?
          if [ ! -f trivy-image.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > trivy-image.sarif
          fi
          echo "scan_exit_code=${scan_exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload image scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif

      - name: Fail on vulnerabilities
        if: steps.trivy_image.outputs.scan_exit_code != '0'
        run: exit 1
